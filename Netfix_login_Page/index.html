<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="net.css">
    <title>Netflix Login </title>
</head>

<body>
    <div class="first-landing-page">
        <nav class="nav-bar">
            <img src="assets/images/logo.svg" alt="Netflix_logo" width="150">
            <div class="top-buttons">
            <button style="background-color: #3a3a3a;">English</button>
            <button>Sign In</button>
        </div>
        </nav>
        <div class="main">
            <h2 class="text">Unlimited movies, TV shows and more</h2>
            <p class="text">Starts at ₹149. Cancel at any time.</p>
            <p class="text">Ready to watch? Enter your email to create or restart your membership.</p>
            <div class="wrap-input">
                <input type="text" placeholder="Email adress">
                <button>Get Started ></button>
            </div>
        </div>
    </div>
</body>

</html>
